      date: "Apr 2024",
      body: `<p>Electric cars are vehicles that are powered by electrical motors that draw electricity from a battery. Since EVs run on electricity they produce zero emissions improving air quality and reducing the overall environmental impact. EVs have significant benefits to our community such as creating a sustainable and environmentally friendly future for generations to come. Our generation's transportation is responsible for approximately 50% of greenhouse gas emissions and 80% of air pollutants. This is not only dangerous to the environment but to humans as well. Gasoline vehicles burn fossil fuels and when they do this they release large amounts of carbon dioxide, a greenhouse gas, into the air that we breathe causing pollution. Additionally, as greenhouse gas emissions surround the Earth, they trap the sun's heat leading to global warming and climate change. It's our job to put an end to global warming and the first step is to transition to electric cars.</p>
             <h2>The Technology Behind Electric Cars</h2>
             <div class="photo-row">
               <img src="evpics/evwithwords (1).jpeg" alt="Electric car technology" />
               <img src="evpics/evdiagram2 (1).jpeg" alt="Electric car charging" />
             </div>
             <p>Electric cars are powered by rechargeable batteries that store electricity. When you charge the car, the batteries store electricity to operate. The electric motor is like an engine but it runs on electricity instead of gas. When you press the accelerator, the electric motor receives electricity from the battery, and then controls the speed of the car. Unlike traditional vehicles, EVs don't have multiple gears to shift the car between accelerating and decelerating. The gears are necessary to gasoline vehicles because it allows the driver to run the engine at different speeds. But EVs have electric motors that generate a large range of different speeds defeating the need of gears. The wheels of an EV are powered by the electric motor, and when the brake is used, some of the energy is captured and is used to recharge the batteries. Altogether, EVs are powered by batteries that store electricity and are energy efficient.</p>
             <h2>The Promising Future of Electric Cars</h2>
             <p>Along with being an eco-friendly mode of transportation, EVs are also affordable vehicles. EVs may be more expensive during the buying process but the maintenance fee is half as much as gasoline drivers have to pay. Customers who own electric cars save an average of $4,600 in repair and maintenance costs. However, EVs are the newest technology when it comes to vehicles making them more expensive. But as the production of EVs continues to increase the price will eventually fall making it more affordable.</p>
             <div class="photo-row">

             </div>
             <p>The future of EVs are quite promising considering ongoing technology advancements, an increase of investments, and growing consumer interest. It's predicted that there will be improvements in the battery such as the energy density, charging speed, and cost reduction. Also autonomous driving technologies may become more widespread in EVs. Enhancing the overall driving experience and contributing to the development of new technology in transportation systems. Governments may also begin implementing stricter regulations about emissions, further encouraging the shift towards EVs. Additionally, governments are investing in buildings for charging the vehicles, making EVs more practical for everyday use. Lastly, as EVs become more popular there will be more competition and variety in the vehicles. Allowing customers to have more choices in affordable EVs. EVs are the future of technology.</p>

      title: "⟡ The Dangers of Underwater Noise",
      category: "Environment",
      date: "Mar 2023",
      body: `<p>For many years, there has been a debate whether or not underwater noises disturb marine life. Scientists have conducted studies by attaching a digital recording device to beaked whales to check how they respond to noises. Some of the studies showed no negative impacts, while others showed a large amount of disruption. Although some studies suggest that sonar activities are not detrimental to marine life, it has been shown that it can disturb their communication and behavioral patterns. Therefore, sonar activities have a negative impact on marine life.</p>
             <p>The Navy’s studies indicate that sonar does not adversely harm marine animals; however, an incident in the Bahamas suggests otherwise. According to What Underwater Noise?, “The issue became critical after an incident in 2000 in which 17 whales became stranded in the Bahamas.” These underwater noises caused disruptions in beaked whales' communication with each other, leaving them separated from their pod. Also, this severe incident can stress a beaked whale, which can result in changes to their behavioral patterns.</p>
             <p>Scientists have studied marine life patterns during sonar activities, showing that these underwater noises disturb their behavioral patterns. According to What to Do about Underwater Noise, “The data suggested that beaked whales were especially sensitive to even low levels of underwater noise.” To this point, even low levels of sonar activity have a significant impact on animal behavior, causing interruptions to their feeding and diving patterns. These underwater noises destroy the health and wellbeing of marine life.</p>
             <p>In light of these findings, sonar activity has been shown to be disruptive to marine life, causing them to become stranded and responsible for changing their behavior patterns. Should these sonar activities continue, more marine creatures are likely to become stranded or separated from their groups. Additionally, stress could change their patterns, causing a shorter life span, which may also result in extinction. We need to immediately put an end to sonar activity.</p>`

      body: `<p>Big orange flames start spreading through a forest. Animals flee from the scene as chaos erupts. Firefighters come with their water hoses and extinguishers. As the smoke begins rising, firefighters begin coughing. Soon the wildfire gets out of control, people start fleeing from their homes with their loved ones. As the traffic gets worse, people start getting out of their cars and start fleeing by foot. This is what happens when a wildfire begins. It may seem manageable at first but soon gets out of hand. People have been suffering from the effects of wildfires for years. Many got lung cancer from the smoke while evacuating their homes, while others got into a car accident because they couldn’t see the road ahead of them due to the smoke. It is critical that we save our resources before another disaster strikes. Let’s finally take action and learn more about why wildfires are destructive.</p>
             <h2>Trees Burned Down & Release of Carbon</h2>
             <p>Generally wildfires occur in forests which have trees and other plants.You may already know that trees produce a type of oxygen called CO2 (carbon dioxide), which is the type of oxygen that we breathe. When trees are burned down, they start producing a new type of oxygen, which is not safe for humans. This new type of oxygen is called carbon. For example, if you were to breathe in carbon you would start having difficulty breathing, which could soon lead you to the hospital.</p>
             <p>It may feel like if one tree is burned down it doesn’t affect the environment, but it does. Soon after one tree is burned down the fire starts spreading tree to tree, which soon affects climate change. Carbon can increase global warming because once carbon continues building up, it will soon start melting all of the ice around the world, which soon endangers multiple species such as polar bears or penguins. If trees continue burning down, there will soon be many extinct species.</p>
             <p>Therefore, when trees are burned down the new oxygen that is released from trees not only affects our lungs but also climate change. So make sure to stay safe if by chance there is a wildfire burning near you.</p>
             <h2>Bad Air Quality</h2>
             <p>Many counties in California have been quarantined this year due to the bad air quality from wildfires like the Dixie fire. Students are not allowed to have recess or lunch outdoors. Many people have been staying at home and have not yet left their homes. This impacts our bodies because when we are inside, we can’t exercise as much as we can outside. For example, when we are outside, we can run around and jog around our neighborhood. However, when we are locked up inside, we can’t run around without bumping into furniture or other objects. Many people don’t have exercising equipment at home, so they have to rely on running or other exercises that require outdoors. It can be dangerous if someone were to run or jog when a wildfire broke out because the smoke would soon reach their lungs, which can lead to them having an asthma attack or other breathing problems.</p>
             <p>Speaking of health problems, wildfires can cause people with asthma to not go outside in the smoke without coughing and choking. Firefighters can possibly get lung cancer if they don’t wear special masks when extinguishing a fire. Even if they wear them they can still get lung cancer and other breathing problems, which can possibly soon lead to their death if their breathing problems continue getting worse.</p>
             <p>Due to the smoke and bad air quality, many people need special care so that they can breathe properly. When wildfires break out, they send many people to hospitals because they got burns, they got into a car accident, or they are having trouble breathing. This also means many people need to pay for hospital or doctor visits, and if a patient keeps visiting, they can soon start losing lots of money especially if they don't have medical insurance. While people are evacuating their homes they may be speeding through the thick clouds of smoke and they can possibly crash into someone else because the road ahead of them is unclear due to the smoke. “We were surrounded by fire. We were driving through fire on each side of the road,” Police Officer Mark Bass said. “Nobody could hardly see the road ahead. It was a very dangerous situation,” said Mark Bass.This can also cause people to go to hospitals. As you can see, wildfires even have an effect on money and health, so it is very important that you safely evacuate your home or wherever you are in case of a wildfire.</p>
             <h2>Homelessness Rising Due to Wildfires</h2>
             <p>Many homes have been burned down due to severe wildfires. This is causing homelessness to increase because when someone’s home is burned down they might not have anywhere to go or to live because they don’t have any family living near them. This means they need to live on the unsafe streets or homeless shelters. But there may not be any homeless shelters or the homeless shelters are all full. This means someone might need to live on the streets. This will soon become a problem because in California wildfires are pretty common and happen multiple times a year. In San Francisco, California there are many homeless people living on the streets and if more homes are burned down the population of San Francisco might continue growing which can become a problem because if there are more people more jobs will need to be required.</p>
             <p>In 1980, Mount St.Helens erupted and started many wildfires. About $1.1 billion of property was damaged due to the severe wildfires and lava caused by the eruption. Sadly, 57 people passed away because of the wildfires and lava. The news about the eruption spread fast. Soon news channels started reporting about the eruption.“That is so scary,” said 12 year old Lisa Hodson. After watching the news about the eruption. According to Lisa Hodson there was a lot of ash and soot in the air around the area where Mount St.Helens erupted. Lisa Hodson also said that there were some people in the way of the lava.</p>
             <p>Every year homes are burned down due to wildfires and people become homeless. We need to improvise and think smarter. One way we can do this is by opening more homeless shelters around areas where wildfires are more common and more severe. Let’s end homelessness!</p>
             <h2>Impact on Wildlife & Plants</h2>
             <p>Imagine your favorite animal going extinct. For example, imagine your favorite animal is a bird. A lot of birds live in forests which is a common place where wildfires occur. Think about a bird’s family trying to fly away from the smoke and fire. Some might lose their family because they can’t see what direction they went due to the smoke. Or some of the older birds and younger birds might die because they can't survive the bright red and orange flames.</p>
             <p>Wildfires make wildlife find more habitats. This can be a major con or problem  because while animals are trying to find a new home or habitat they might run into humans or hunters they have been trying to avoid. But everything has its own pros and cons. But look at the bright side luckily most animals can use their senses to detect when a fire is started. For example, they can tell you their sense of smell to detect if they smell anything burning. They can also use their sense of sight to see if they can see any smoke or fire coming their way. Another pro of wildfires is that it affects a species named jack pine which can only produce seeds to grow more trees with fire. A lot of plants die in the forest because they don’t get enough sunlight because there are too many trees blocking the sunlight. But when fires burn down trees they allow other plants to grow in the sunlight. Wildfires can also deplete food for animals. For example, generally when wildfires occur they burn down plants which a lot of animals survive on. As you can see, it's quite difficult to tell if wildfires are good or bad because they have a lot of pros and cons about it.</p>
             <p>Wildfires have different effects on everything. In this article I discussed different things that are affected by wildfires. For example, I discussed that wildfires affect the oxygen that we breathe. I also discussed that wildfires affect climate change. The message I hope to spread is why wildfires are destructive and how we can prevent wildfires from affecting our daily lives. If you would like to learn more about wildfires feel free to check out https://education.nationalgeographic.org/resource/wildfires/ and https://www.plt.org/educator-tips/wildfires-causes-effects-educational-activities</p>`

             <p>6. COVID-19 looks like a tiny ball that has spikes.</p>
             <p>7. COVID-19 has glucose in it.</p>
             <p>8. You have a higher chance of getting COVID-19 if you have another disease.</p>
             <p>9. If you are 65+ you also have a higher chance of getting COVID-19.</p>
             <p>10. You can not get COVID-19 by eating food.</p>
             <p>11. If you wash your hands a lot you have a lower chance of getting COVID-19.</p>`
    },
  ];

  // ── RENDER LIST ──
  const listEl = document.getElementById('article-list');
  articles.forEach((article, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <button onclick="showArticle(${i})">
        <span class="article-title">${article.title}</span>
        <span class="article-meta">${article.date}</span>
      </button>`;
    listEl.appendChild(li);
  });

  // ── NAVIGATION ──
  function showArticle(i) {
  const a = articles[i];
  document.getElementById('detail-label').textContent = a.category;
  document.getElementById('detail-title').textContent = a.title;
  document.getElementById('detail-subtitle').textContent = a.subtitle || '';
  document.getElementById('detail-body').innerHTML = a.body;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── DROPDOWN ──
  function toggleDrop() {
    document.getElementById('workItem').classList.toggle('open');
  }
  document.addEventListener('click', e => {
    if (!document.getElementById('workItem').contains(e.target)) {
      document.getElementById('workItem').classList.remove('open');
    }
  });
</script>

</body>
</html>
