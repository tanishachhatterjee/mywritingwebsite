    {
      title: "⟡ A Lesson from the Fish",
      category: "",
      date: "Sep 2025",
      body: `<p>The trees swayed as we walked through the narrow trail, the hot air sticking to me like glue. Sweat slid down my back, and my arms were already sore from carrying my fins and mask. Every step felt harder than the last. </p>
                        <p>“Take some pictures of me here. I’ll take some of you after,” my sister said, already posing with one hand on her hip. </p>
                        <p>I snapped a few.</p>
                        <p>“No, no, the angle’s wrong. Take it higher,” she criticized.</p>
                        <p>“Seriously? I’ve taken like a million already. Just take some of me now,” I whined.</p>
                        <p>“Girls, are you just gonna spend the whole time taking photos? We’re not even at the bay yet. Hurry up,” my dad groaned, definitely questioning his life choices.</p>
                        <p>We kept walking. The smell of saltwater got stronger, like the ocean was yelling, almost there. Finally, we stepped out of the trees, and there it was — Honolua Bay.</p>
                        <p> It was the type of place people put onto postcards. The bright blue water sparkled like diamonds, the black rocks sizzled under the sun, and the trees rocked peacefully. I could hear small waves slapping against the rocks and people nearby jumping into the water.</p>
                        <p>“Let's go,” Dad said, practically sprinting to the shore.</p>
                        <p>The rocks were burning hot, like walking on a pan, but weirdly I kind of liked it. It felt better than the muddy trail. My sister and I started putting on our gear.</p>
                        <p>“I hope this new snorkeling gear actually works,” she said, already suspicious.</p>
                        <p>“Yeah, water better not leak into my eyes and mouth,” I joked.</p>
                        <p>I plunged into the water, and the coldness seeped into my body like a thousand needles at once. It made me feel alive after hiking in the hot sun. Dad cannonballed in right after, splashing my sister so badly she shrieked.</p>
                        <p>“Ahh my eyes are burning,” she yelled.</p>
                        <p>“You’re fine. Just get in already!” I laughed, wiping water from my face.</p>
                        <p>Finally, she slid into the water, still complaining. But once we started snorkeling, it was amazing. Large schools of fish zipped past me, all staying together. An octopus quickly curled into the rocks, trying to hide. Then I heard crunching. Chomp Chomp! My sister pointed at a red parrotfish gnawing on coral. It sounded exactly like bubble wrap popping, echoing strangely through the water.</p>
                        <p>Then she suddenly shot up. I slowly followed her to the surface.</p>
                        <p>“There’s water in my mask and snorkel,” she coughed.</p>
                        <p>I waited patiently while she fixed it, but it kept happening.</p>
                        <p>“This is so annoying. I’m going back to the shore,” she said. </p>
                        <p>“I’ll go with you,” I said. </p>
                        <p>We made it back to the mossy rock we always used. It was slimy and slippery, like soap. She climbed on to fix her gear.</p>
                        <p>Dad waved me over. “Let’s swim while she fixes it. No point in waiting,” he said.</p>
                        <p>So I followed him. He was kicking like a motorboat, leaving bubbles everywhere, and I ended up drifting behind. We got carried away and didn’t even realize how far we’d gone until we turned back and the rock was empty. My heart dropped</p>
                        <p>“She’s not there,” I said, panicking.</p>
                        <p>We scanned the water. I thought I saw her yellow fins, but the bathing suit was wrong. Dad and I started yelling her name, which echoed across the bay. People started staring.</p>
                        <p>“We should split up,” I said.</p>
                        <p>“No. You stay here, I’ll check the rocks,” Dad ordered.</p>
                        <p><em>Stay here? Seriously? That’s the worst plan ever. She’s out there somewhere, and I’m just floating here being useless. I could be swimming around and looking for her right now.</em> But then I looked at his worried face, watching his eyes darting everywhere. He wasn’t just worried about her. He was worried about me too. I floated there, shivering as the wind hit my wet skin. <em>What if she drowned? I should’ve stayed with her. </em>My brain was spiraling.</p>
                        <p>Dad tried climbing on the mossy rock to get a better view, but in a rush he slipped. <em>BAM!</em>He fell right back into the water. I lost it, laughing so hard I couldn’t breathe. People stared like, <em>wow, some daughter and sister you are. </em>But I couldn’t help it, that’s just how I deal with stress — I laugh at the worst times.</p>
                        <p>Meanwhile, Dad was panicking, asking strangers, “Have you seen my daughter?”</p>
                        <p>His voice shook, and suddenly it hit me. <em>What if she wasn’t just nearby? </em>The water all looked the same, and my heart pounded harder the longer we didn’t see her.</p>
                        <p>Finally, after what felt like forever, I saw a familiar head bobbing in the water. Relief slammed into me.</p>
                        <p>“OMG, where did you go,” I yelled.</p>
                        <p>“I saw you guys swim out, so I tried to catch up,” she said, like it wasn’t a big deal.</p>
                        <p>Dad swam over and hugged her tight.</p>
                        <p>“I was worried sick about you. Why would you just leave?” he yelled.</p>
                        <p>A fisherman scowled. “Keep it down. This is supposed to be a peaceful place.”</p>
                        <p>Dad went red. “Sorry. I couldn’t find my daughter.”</p>
                        <p>My sister rolled her eyes. “Why’d you guys go so far? You said you’d stay close.”</p>
                        <p>“We didn’t realize how fair we swam out. I should’ve stayed with you,” I admitted.</p>
                        <p>Dad pulled us into a soggy group hug. For a moment, Honolua Bay didn’t feel like paradise. It felt like a reminder. The ocean is beautiful, but things can turn from fun to frightening easily. That day, snorkeling wasn’t really about the fish. It was about us. Just like fish stay in schools to protect each other, we had to stick together, and watch out for one another. Getting lost is only funny once everyone makes it back safely. Still, the funniest part will always be Dad slipping on that slimy rock.</p>`
    },

    {
      title: "⟡ Thank You",
      category: "",
      date: "Jun 2023",
      body: `<p>I walked along the sidewalk beside my friend to her mom’s car. She was talking but I wasn’t listening. I was busy thinking about the math placement test on Thursday. This test was very important to me. It decided which math level you were placed into the following year. I had to get into the highest level because my older sister got into it. As I got into the car I thought about how amazing it would be if I got in. My parents would be so happy because I “followed my sister's footsteps”. But then I thought about what would happen if I didn’t get in. My parents would be very upset and the worst is, I would be too. From that moment, I knew it was a bit too late but I still had to try my very best. Once I got home I sat in the office room and opened my laptop. I remembered my math teacher told us to look at the math pacing guide to study for the test. I found the document and started looking at the concepts. I realized that I barely knew any of the advanced concepts that would be on the test. I started panicking and I felt sweat dripping from my face.</p>
             <p>I searched up the concepts and tried to learn them from YouTube but I couldn’t understand them. My sister walked into the office room and saw me panicking. “What’s wrong?” she asked. “I have my placement test in two days! And I don’t know any of the concepts,” I responded. After explaining to my sister she took a look at the guide and told me that she could help me. She first taught me the concept “systems of equations. “Systems of equations is a bit difficult, I’m not sure if I can teach it to you so quickly,” my sister said in a worried voice. “I’ll try my best to understand,” I replied. She first wrote the formulas on the board and then explained what the concept is. Surprisingly, I was able to understand the concept but when she gave me some problems I struggled to solve them.  After some practice I was able to do it. The next concept was geometry. Geometry has always been a tough concept for me in math. My sister said a bunch of math vocabulary words that I had never heard before. I told her I understood it but when she asked me some questions I couldn’t answer.</p>
             <p>It was now one day before my test. I still hadn’t understood the geometry part. I wanted my sister to teach it to me again but she had her own studies to focus on. She told me that she would help me once she was done but I was too worried. I tried to teach myself and watched the videos my math teacher made. <em>I should’ve started this pacing guide from the beginning of the school year.</em> There was no point of thinking of that at this point in time. I tried to ignore how close the test was to me and focus on learning the material. But I couldn’t stop thinking about it. Finally, my sister had finished her homework and was able to help me again. She started from the beginning and this time explained in an easier way. Little by little I started to understand the concept. But then I came to solving the problems by myself. For some reason, whenever it was my turn to do the problems I would blank out. I reviewed the notes I took when my sister taught me and I found the parts I didn’t understand. My sister taught me those parts again but I still wasn’t able to understand. At this point, I felt like giving up. I stopped studying for the test and I worked on an essay for language arts. Language arts was my favorite because I loved writing. I took out my emotions in my writing and wrote continuously. I finished my essay and turned it in. I knew I couldn’t run away from my problems so I continued to study.</p>
             <p>The test was the next day so I tried to understand the last concept. I needed to take a break so I listened to Taylor Swift. As I listened, I thought about how much work Taylor Swift has put into her career. And I decided that I need to do the same. I searched up “Taylor Swift’s achievements” and I saw an endless page with many articles about her. At that moment, I knew I had to keep on trying until I understood the concept. Whenever I couldn’t solve a problem I thought about her and tried my best. Once I was done with the last problem my sister checked my work. When she gave me my work back I saw that none of the problems were checked wrong. I felt so proud of myself. I felt confident for the test and reviewed all of the concepts.</p>
             <p>As I walked into my math class the next day, I felt confident. I opened my ipad and logged into the test. First, I completed the normal test we had to do and it was pretty easy. Once I was done with the first test I moved onto the advanced test. I felt nervous but I knew that I just had to try my very best. When I opened the test I first looked at each question. Sweat dripped down from my face. None of the concepts I studied were on the test. I freaked out and tried to calm myself. I carefully read the first question and then solved it. Once I came to the middle of the test it started getting very hard and I felt like giving up. I thought about Taylor Swift. <em>Did she ever give up? No she didn’t, so you can’t either.</em> Taylor Swift was my inspiration so I tried my best like she would’ve. I finally finished my test and went to my teacher to get my score. I closed my eyes and hoped I passed. “Congratulations Tanisha, you passed!” My teacher said excitedly. I felt so happy and proud of myself. Once I came back I told everyone the great news. “Thank you so much! I couldn’t have done it without you,” I told my sister. I wanted to thank Taylor Swift but I couldn’t.</p>`
    },

    {
      title: "⟡ The LOL Doll Incident",
      category: "",
      date: "Feb 2023",
      body: `<p>“Mom, can we go out today?”I asked. “Maybe another day since your sister is out with her friends and she won't be able to come,” mom responded.</p>
                        <p><em>No, that's not fair!</em></p>
                        <p>“But that's not fair because I’m not going out with my friends,” I said angrily.</p>
                        <p>“Ok fine, but just this once without your sister,” mom reluctantly agreed.  </p>
                        <p><em>Yes, mom is the best!</em></p>
                        <p>My mom and I went into our dark metallic blue car and drove off. We decided that we would go to a Thai restaurant since that was our favorite. After lunch my mom checked her pockets, and found coupons for CVS. So we decided to go there and get a couple of things. Once we arrived I browsed through the items closely following my mom in fear of getting lost. My mom stopped at the makeup section and looked at all of the makeup which felt like hours. So I decided that I would venture off in the CVS.</p>
                        <p>“Mom, can I get some toys or candy?” I asked.</p>
                        <p><em>I really hope that mom lets me get something because if she does this day will get even better!</em></p>
                        <p>“Yeah, sure but make sure you don’t go too far.” Mom responded. </p>
                        <p><em>Mom is the absolute best!</em></p>
                        <p>I quickly ran out of the makeup aisle in excitement to look for some candy, or toys. My first stop was the candy aisle. I continuously turned around to make sure my mom was in the same place I left her. After I had checked that she was still there I looked at all of the candy scanning to find my favorite lollipops. But unfortunately, they weren’t there so I ran to the toy aisle. I look at all of the stuffed animals wondering about who would ever get them. When I spotted it, a bright green ball that had the letters “LOL Doll”. The moment I saw it, I quickly grabbed it. I ran over to my mom in excitement and asked her if I could get it.</p>
                        <p>“Mom, Mom!,” I screeched in excitement, “Can I get this doll?”</p>
                        <p>“How much is it?” Mom asked.</p>
                        <p><em>Hopefully mom still lets me get this doll even though it's quite expensive.</em></p>
                        <p>“Eleven dollars,” I responded.</p>
                        <p>“Ok, but you better play with it since it's very expensive,” mom said.</p>
                        <p><em>Thank goodness mom let me get this doll. If she didn't I would’ve been upset for the rest of the day!</em></p>
                        <p>We then checked out and paid for our items. My mom decided that we would go to a park that had lots of ponds and geese so that I could open my new doll there.</p>
                        <p><em>I’m so excited to go to the park because I love ponds and animals!</em></p>
                        <p>After we arrived at the park we found a clean bench that we could sit at and open the toy. My mom took out her phone and started recording me opening the doll. I started peeling off the plastic from the ball acting like the YouTuber’s I used to watch. Everything was going to plan until I reached the middle of the ball and pulled too hard on the plastic and lost grip of the ball.</p>
                        <p><em>Oh no! Mom is going to be so mad!</em></p>
                        <p>The ball started rolling fast in the direction of the pond. It seemed like it was going as fast as a raging bull! My mom and I both ran after it and fell down on the cement. My mom stretched her arm and grabbed the ball at the last moment. I started crying because I thought that my legs were bleeding since I fell down.</p>
                        <p>“I’m so sorry,” I cried.</p>
                        <p>“I shouldn’t have ever asked you to get me this doll,” I continued, “I’ll never ask you for anything again.</p>
                        <p>“It’s ok you don’t need to cry, it was just a mistake and I was still able to catch it,” mom said.</p>
                        <p>I kept my legs away from my mom because I was afraid to see what they looked like after I had fallen. But my mom looked at my legs and they were fine. But my mom had a scrape on her knee and I felt so bad.</p>
                        <p><em>If only I hadn't asked for the doll, mom wouldn’t have gotten hurt. It’s all my fault! That should have been me who got hurt since I was the one who wanted the doll.</em></p>
                        <p>After that we went back home and I continued to open my doll while my mom treated her scrape. After I took off all the plastic I saw my doll, she had a green dress and pink hair. I was quite disappointed.</p>
                        <p><em>I wanted the glittery doll. But I won’t complain to mom about the doll because it has already caused her to get hurt.</em></p>
                        <p>In the end, even though my mom scraped her knee because of my LOL doll and I didn’t get the doll I wanted, I still had an amazing day and I learned that I should be more careful with new things</p>
             <p></p>`

    {
      title: "⟡ The Dangling Spider",
      category: "",
      date: "Dec 2022",
      body: `<p>“Mom, when's dinner going to be ready?” I asked. “One second,”my mom said. Just as I was about to take my first bite, I heard my sister scream, “ OH MY GOD THERE’S A SPIDER NEXT TO YOUR HEAD!” I thought back to all of the times my sister pranked me. I remembered when I said, “I’m not going to fall for your pranks ever again!” I jolted back to my sister screaming, “there’s a spider!” “Don’t worry she’s lying,” I thought to myself. “There is literally a spider next to your head,” my sister screamed every second. I tried my best to ignore her, so she would eventually stop.</p>
             <p>When I finally said, “I’m not falling for your pranks”. “I’m not pranking you!” she said. I tried as hard as I could to bottle up my anger. I felt like stomping out of the dining room. I just couldn’t fall for her prank.</p>
             <p>Ten minutes later, after arguing with my sister, my mom came in looking at her phone. When I asked her, “Mom, why does she keep saying that there's a spider next to me?” My mom looked up as her eyes got wider and wider. “What?!” I shouted . “What if there actually is a spider next to me?” I thought. “Because there actually is a spider next to you”, my Mom said looking shocked. “Let me guess you're in on the prank as well?” I said. “It’s not a prank,” they exclaimed.</p>
             <p>I slowly turned my head to the left and saw no spider. “See there’s nothing I knew you guys were lying,” I said happily. “Look to your right,” my sister said. I tilted my head to the right feeling the shivers. To my surprise, I saw a big gray spider dangling from the ceiling. I quickly jumped off my chair and screamed, “AHHH!” I ran to my dad and said, “THERE’S A BIG GRAY SPIDER IN THE DINING ROOM!” “What did you say?”my dad asked. “There’s a spider in the dining room,” I said a bit more calmly. My dad gently picked up the spider and put it outside.</p>
             <p>“Don’t ever think about coming back,” I yelled. I gave the spider a stern look as it quickly hopped into a bush. “I guess you guys were actually telling the truth,” I admitted. My mom and sister smiled.</p>`

    {
      title: "⟡ Getting Pushed by the Waves",
      category: "",
      date: "Oct 2021",
      body: `<p>It was my fourth day in Hawaii and all I wanted to do was to go to my hotel’s swimming pool and to the ocean that’s in front of it. I convinced my family that we should stay at the hotel’s property so that we’re not so tired out like the other couple of days. And they reluctantly agreed. We decided that we’d first go to the pool then the ocean. My dad, sister, and I swam in the pool and went on the water slides while my mom just stayed in the pool. We were in the pool for quite some time so we decided to move on to the ocean.</p>
             <p>My sister and I grabbed our floaties and headed to the ocean. My sister and I liked to sit on the floaties and move with the ocean’s current rather than swimming. The big waves started coming so my mom and dad kept a close look on my sister and I. They were also in the water. The sky started forming dark gray clouds all over the beach. My dad’s legs were covered with wounds because while he was walking in the ocean’s water he stepped on a couple of sharp rocks.</p>
             <p>Then a ginormous wave crashed on everyone who was in the ocean. My sister and I toppled into the ocean. Though the water wasn’t very deep I jumped out of the water and jumped onto my dad because I was scared of drowning. Once I calmed down I got back onto my floatie. My family and I stayed at the beach for the rest of the day joking about what had happened. Still to this day my family and I laugh about this incident.</p>`

    {
      title: "⟡ Snorkeling in Hawaii",
      category: "",
      date: "Sep 2022",
      body: `<p>It was my second day in Hawaii after landing in the airport. That day my family and I decided that it was time to go to the pool in my hotel. We brought our snorkeling gear just in case we decided to go snorkeling in the ocean. We also brought our floaties in case we changed our minds.</p>
             <p>Once we arrived at the pool my sister and I headed straight for the water slides. We each took our turn and went down to the water slide. My parents then decided that it was time to head to the ocean and go snorkeling. But the thing was I forgot how to snorkel. So my sister decided that she would teach me in the swimming pool. She first put on my gear then her’s. But I felt like she was taking too long to put on her gear and I just wanted to go snorkeling. So I decided that I would just do it myself. I went a bit too deep into the pool water and I tried to breathe through the mouth piece. But if you have gone snorkeling before then you know that if you breathe through the mouthpiece underwater you’re going to end up drinking the pool water. So that’s what exactly happened. When I breathed in, all of the water went into my mouth. But before I understood what happened I accidentally swallowed the water. I gagged after I accidentally swallowed the water because the pool water tasted terrible.“Eww,” I screamed. “That’s what happens when you're not patient,” my sister exclaimed.</p>
             <p>After my sister taught me how to snorkel. And then my family and I went to the ocean to go snorkeling. At the end of the day I learned that I need to be more patient when waiting for something. So whenever I’m impatient I go back to this moment and try to figure out what I could do instead of being impatient.</p>`

    {
      title: "⟡ First Time Walking Back Home",
      category: "",
      date: "Sep 2021",
      body: `<p>“Bye Ms.Ou see you tomorrow!” I excitedly said. It was my first time walking back home by myself. I felt like there were butterflies in my stomach. “It’s ok you can do this, just run back home,” I told myself nervously. I walked through the park. I saw so many other kids playing, one on the swings and another on the rock wall climbing. I was super nervous, “it’s okay just keep going, you can do this,” I confidently said to myself.</p>
             <p>I ran and ran until I made it to the first crosswalk, when I thought to myself, “I can’t run forever,” I tried to pace my breath. Then I looked to my left then to the right to make sure no cars were there. But I was scared. What if a car comes out of nowhere? So yes, I stood there for five minutes and no car ever came! I finally crossed making sure to constantly look to both sides.</p>
             <p>Then I finally made it to the second crosswalk. It was practically burning, I felt like I was melting like a snowman! But that was when the REAL PROBLEM came along. When I was about to go I saw a yellow car with a man inside of it driving. I told him to go. But then he was telling me to go. But then I was telling him to go. “Oh no, I’m going to be here forever!” I groaned to myself. It was like the man and I were arguing about who was going to go first, until I finally decided to go. While I was going, I remembered what my parents told me, “make sure to always make eye contact with the driver so he still knows that you're there.” So I did exactly what my parents told me to do, and I gave that man a serious look as I walked away.</p>
             <p>Finally, I saw my house. I got ready to run and I went off. By the time I reached my house my face was all red and I was completely out of breath. Just when my mom asked, “How’d you get here so fast, and why does it look like you just ran a marathon?” “Uhm it does haha, well I mean our house is pretty near the school and I probably have fast legs!” I replied. My mom looked at me knowing clearly I was lying to her.</p>`

    const a = articles[i];
    document.getElementById('detail-label').textContent = a.category;
    document.getElementById('detail-title').textContent = a.title;
    document.getElementById('detail-body').innerHTML = a.body;
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── DROPDOWN ──
  function toggleDrop() {
    document.getElementById('workItem').classList.toggle('open');
  }
  document.addEventListener('click', e => {
    if (!document.getElementById('workItem').contains(e.target)) {
      document.getElementById('workItem').classList.remove('open');
    }
  });
</script>

</body>
</html>
